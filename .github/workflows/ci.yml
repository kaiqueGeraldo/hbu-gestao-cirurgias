name: CI HBU Gestão

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 1. Pipeline do Backend (Java/Maven)
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hbu-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Build and Test com Maven
        run: ./mvnw clean verify -DskipTests=false

  # 2. Pipeline do Frontend (Next.js/Node)
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hbu-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint and Build
        run: |
          npm run lint
          npm run build
